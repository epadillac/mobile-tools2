# Kamal deploy config for mobile-tools.
#
# Usage:
#   1. Provision a DigitalOcean droplet (Basic 1GB / $6/mo is enough for low traffic).
#      Use Ubuntu 24.04 LTS. Open ports 22, 80, 443.
#   2. Set up your image registry. Easiest is GitHub Container Registry (ghcr.io,
#      free for private repos): create a Personal Access Token with
#      "write:packages" scope.
#   3. Fill out .kamal/secrets (see template), then:
#        bin/kamal setup        # one-time: installs Docker on the server, etc.
#        bin/kamal deploy       # builds image, pushes, runs on server
#   4. Subsequent deploys: bin/kamal deploy
#
# Docs: https://kamal-deploy.org

service: mobile-tools

# Sensitive deploy parameters are read from environment variables so the
# YAML stays free of secrets and droplet IPs. Locally these come from `.env`
# (Kamal autoloads it). In CI they're injected by GitHub Actions secrets.
# See `.env.example` and docs/deploy.md for the full list.
image: <%= ENV.fetch("KAMAL_REGISTRY_USER") %>/mobile-tools

# DROPLET_IP is the public IPv4 of your DO droplet, e.g. "157.230.XXX.XXX".
servers:
  web:
    - <%= ENV.fetch("DROPLET_IP") %>

# Connect over SSH as the unprivileged `deploy` user we created on the droplet
# (instead of root). Kamal will sudo for the few steps that need it (apt
# install during `bin/kamal setup`, etc.) — we configured passwordless sudo
# for `deploy` so that step is non-interactive.
ssh:
  user: deploy

# Kamal-proxy terminates TLS via Let's Encrypt at the host. No nginx needed.
# Make sure the DNS A record for `proxy.host` points at DROPLET_IP before the first deploy.
proxy:
  ssl: true
  host: <%= ENV.fetch("DEPLOY_DOMAIN") %>   # e.g. app.bambuapps.xyz
  app_port: 80                              # matches Thruster's EXPOSE 80 in the Dockerfile
  healthcheck:
    path: /up                               # Rails default health endpoint
    interval: 5
    timeout: 30

# Image registry credentials. The password (a token) comes from .kamal/secrets;
# only the username is kept here, and even that is env-driven.
registry:
  server: ghcr.io                           # change to registry.digitalocean.com if using DOCR
  username: <%= ENV.fetch("KAMAL_REGISTRY_USER") %>
  password:
    - KAMAL_REGISTRY_PASSWORD

# Environment variables injected into the running container.
# - secret: read from .kamal/secrets at deploy time, stored in Docker secrets.
# - clear: written into the container env directly.
env:
  secret:
    - RAILS_MASTER_KEY                # required to decrypt config/credentials
    - GEMINI_API_KEY                  # ReceiptParserService
    - ANTHROPIC_API_KEY               # ClaudeReceiptParserService (fallback)
    - TELEGRAM_BOT_TOKEN              # TelegramNotifierService
    - TELEGRAM_NOTIFY_CHAT_ID
    # No off-server Litestream backup configured (relying on DO weekly
    # snapshots instead). If you later add an S3-compatible bucket, add
    # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY here, and AWS_ENDPOINT_URL_S3 +
    # BUCKET_NAME to env.clear below — the litestream rake task auto-activates
    # whenever BUCKET_NAME is present.
  clear:
    # Solid Queue runs inside the Puma process (single-server deploy).
    SOLID_QUEUE_IN_PUMA: true

    # Bump this if your droplet has more cores. 1 worker / 3 threads fits the
    # Basic $6 droplet (1GB RAM); Solid Queue runs in the same process.
    # WEB_CONCURRENCY: 2

# Kamal CLI shortcuts: `bin/kamal console`, `bin/kamal logs`, etc.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell:   app exec --interactive --reuse "bash"
  logs:    app logs -f
  dbc:     app exec --interactive --reuse "bin/rails dbconsole"

# Persistent storage on the droplet's disk.
#
# /data        : SQLite databases (DATABASE_URL points here, see Dockerfile).
# /rails/storage : Active Storage uploads + saved diff receipts
#                  (app/controllers/split_checks_controller.rb writes to
#                  storage/diff_receipts; production.rb sets active_storage
#                  to :local which uses Rails.root.join("storage")).
#
# Both volumes survive container restarts and re-deploys. They are NOT backed
# up off-server — enable DigitalOcean's weekly droplet backups (~$1.20/mo) for
# point-in-time recovery, or add Litestream env vars to back up SQLite to S3.
volumes:
  - "mobile_tools_data:/data"
  - "mobile_tools_storage:/rails/storage"

# Bridge old/new asset fingerprints across deploys so in-flight requests
# don't 404 on stale CSS/JS during the rolling release.
asset_path: /rails/public/assets

builder:
  arch: amd64                   # DO droplets are amd64
  # If you build on Apple Silicon and the cross-arch emulation is too slow
  # for local `bin/kamal deploy`, uncomment to build on the droplet itself.
  # GitHub Actions runs on amd64 already, so this only matters for laptop deploys.
  # remote: ssh://deploy@<%= ENV.fetch("DROPLET_IP", "DROPLET_IP_NOT_SET") %>
