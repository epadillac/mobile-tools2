# Solid Queue recurring jobs. This is the Rails 8 native equivalent of cron.
# Jobs run inside the Puma process because deploy.yml sets
# SOLID_QUEUE_IN_PUMA=true. They share the app's connection pool and image,
# so there's no separate container/service to manage.
#
# Schedules use cron syntax (minute hour day month weekday) in the server's
# timezone. UTC unless you set Rails.application.config.time_zone.
#
# Docs: https://github.com/rails/solid_queue#recurring-tasks

production:
  prune_diff_receipts:
    class: DiffReceiptsCleanupJob
    queue: maintenance
    description: "Delete diff receipt files older than 30 days from storage/diff_receipts"
    schedule: "15 4 * * *"     # 04:15 UTC every day
    args: [30]                  # retention in days; bump to 60 if you want more history

  vacuum_sqlite_databases:
    class: SqliteVacuumJob
    queue: maintenance
    description: "VACUUM all SQLite databases to reclaim Solid Queue/Cache churn"
    schedule: "30 4 * * 0"     # 04:30 UTC every Sunday
